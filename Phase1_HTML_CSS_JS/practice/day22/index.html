<!-- DOM = Document Object Model , when we open an webpage then browser converts HTML into DOM , a tree like structure and javascript object which js can access and modify them  -->

<body>
    <h1 id="heading">This is a heading.</h1>
    <button id="btn">Click Me!</button>
    <h1>
        <span>Inside of span of h1</span>
    </h1>

    <script src="./script.js"></script>
</body>

<!-- now browser reads and converts it like a tree
Document
 └── body
      ├── h1
      └── button -->
